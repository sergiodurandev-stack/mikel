name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy changed files via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Get only files changed in this push
          git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          echo "Archivos cambiados:"
          cat /tmp/changed_files.txt

          python3 << 'PYEOF'
          import os, sys
          from ftplib import FTP

          HOST = os.environ['FTP_HOST']
          USER = os.environ['FTP_USER']
          PASS = os.environ['FTP_PASS']

          REMOTE_ROOT = 'httpdocs'
          SKIP_EXTS   = {'.mp4', '.webm', '.mov', '.bak'}

          # Read only changed files
          with open('/tmp/changed_files.txt') as f:
              changed = [l.strip() for l in f if l.strip()]

          if not changed:
              print('Nada que desplegar.')
              sys.exit(0)

          ftp = FTP()
          ftp.connect(HOST, 21)
          ftp.login(USER, PASS)
          ftp.set_pasv(True)
          print(f'Conectado: {ftp.getwelcome()}')

          def ftp_makedirs(ftp, remote_path):
              parts = remote_path.replace('\\', '/').split('/')
              current = ''
              for part in parts:
                  if not part:
                      continue
                  current = current + '/' + part if current else part
                  try:
                      ftp.mkd(current)
                  except Exception:
                      pass

          def upload_file(ftp, local_path, remote_path):
              remote_dir = '/'.join(remote_path.split('/')[:-1])
              if remote_dir:
                  ftp_makedirs(ftp, remote_dir)
              with open(local_path, 'rb') as f:
                  ftp.storbinary(f'STOR {remote_path}', f)
              print(f'  OK   {remote_path}')

          def delete_file(ftp, remote_path):
              try:
                  ftp.delete(remote_path)
                  print(f'  DEL  {remote_path}')
              except Exception as e:
                  print(f'  DEL? {remote_path}: {e}')

          errors = []
          for rel in changed:
              ext = os.path.splitext(rel)[1].lower()
              if ext in SKIP_EXTS:
                  print(f'  SKIP {rel}')
                  continue

              remote = REMOTE_ROOT + '/' + rel
              if os.path.exists(rel):
                  try:
                      upload_file(ftp, rel, remote)
                  except Exception as e:
                      print(f'  ERR  {remote}: {e}')
                      errors.append(rel)
              else:
                  # File deleted from repo — delete from server too
                  delete_file(ftp, remote)

          ftp.quit()

          if errors:
              print(f'\nFallaron ({len(errors)}): {errors}')
              sys.exit(1)
          print('\nDeploy completo.')
          PYEOF
