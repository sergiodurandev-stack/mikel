name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy all files via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          # Write lftp script to a temp file to avoid quoting issues with secrets
          cat > /tmp/deploy.lftp << 'LFTP_SETTINGS'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          LFTP_SETTINGS

          printf 'open -u "%s","%s" ftp://%s\n' "$FTP_USER" "$FTP_PASS" "$FTP_HOST" >> /tmp/deploy.lftp

          cat >> /tmp/deploy.lftp << 'LFTP_COMMANDS'
          mirror --reverse --verbose --only-newer \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob deploy/ \
            --exclude-glob uploads/ \
            --exclude-glob node_modules/ \
            --exclude-glob content.js \
            --exclude-glob image.png \
            --exclude-glob content.backup.js \
            --exclude-glob contentactual.js \
            --exclude-glob diag.py \
            --exclude-glob diag.php \
            --exclude-glob "*.mp4" \
            --exclude-glob "*.webm" \
            --exclude-glob "*.mov" \
            --exclude-glob "*.bak" \
            . httpdocs/
          bye
          LFTP_COMMANDS

          lftp -f /tmp/deploy.lftp
