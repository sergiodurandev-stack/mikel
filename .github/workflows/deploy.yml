name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy all files via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          # Write lftp script — each command on its own line, no backslash continuations
          printf 'set ftp:ssl-allow no\n' > /tmp/deploy.lftp
          printf 'set ftp:passive-mode yes\n' >> /tmp/deploy.lftp
          printf 'open -u "%s","%s" ftp://%s\n' "$FTP_USER" "$FTP_PASS" "$FTP_HOST" >> /tmp/deploy.lftp
          printf 'mirror --reverse --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob deploy/ --exclude-glob uploads/ --exclude-glob node_modules/ --exclude-glob content.backup.js --exclude-glob contentactual.js --exclude-glob diag.py --exclude-glob diag.php --exclude \\.mp4$ --exclude \\.webm$ --exclude \\.mov$ --exclude \\.bak$ . httpdocs/\n' >> /tmp/deploy.lftp
          printf 'bye\n' >> /tmp/deploy.lftp

          echo "=== Script lftp a ejecutar ==="
          cat /tmp/deploy.lftp
          echo "=============================="

          lftp -f /tmp/deploy.lftp
